# ═══════════════════════════════════════════════════════════════
#  Medical RAG-Scanner — Central Configuration
# ═══════════════════════════════════════════════════════════════

# ── Paths ────────────────────────────────────────────────────────
paths:
  raw_data:       "data/raw/images"
  processed_data: "data/processed"
  checkpoints:    "models/checkpoints"
  embeddings:     "models/embeddings.npy"
  image_paths:    "models/image_paths.txt"
  faiss_index:    "models/faiss_index.bin"

# ── Data Preprocessing ───────────────────────────────────────────
preprocessing:
  image_size:     224          # Final image dimensions (224x224)
  clahe_clip:     2.0          # CLAHE clip limit (contrast enhancement)
  clahe_grid:     [8, 8]       # CLAHE tile grid size
  max_samples:    -1           # Max images to process (use -1 for all)

# ── Vision Encoder ───────────────────────────────────────────────
encoder:
  model_name:     "hf-hub:microsoft/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224"
  batch_size:     16
  device:         "auto"       # "auto" picks GPU if available, else CPU
  use_dual_encoder: true       # Combine DenseNet121 (1024-dim) + BiomedCLIP (512-dim) = 1536-dim
  embedding_dim:  1536         # Total joint embedding dimension

# ── Database & Re-ranking ────────────────────────────────────────
database:
  hnsw_m:         32           # Number of graph connections per node
  initial_pull:   50           # Grab top 50 matches instantly via HNSW
  final_rerank:   3            # Final top-K after cross-encoder reranking

# ── Cross-Encoder Reranker ───────────────────────────────────────
reranker:
  enabled:        true         # Use BiomedCLIP text encoder to rerank FAISS candidates
  alpha:          0.6          # Weight for FAISS score (1-alpha = weight for text similarity)
